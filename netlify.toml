[build]
  publish = "dist"
  command = "pnpm install --frozen-lockfile && pnpm run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/parts-catalogue-standalone"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
